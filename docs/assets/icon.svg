<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b2f36"/>
      <stop offset="1" stop-color="#15171b"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7f8fa"/>
      <stop offset="1" stop-color="#d9dde3"/>
    </linearGradient>
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6ea8fe"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- rounded-square app background -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg)"/>

  <!-- back sheets (history stack) -->
  <rect x="332" y="248" width="380" height="500" rx="44" fill="#ffffff" opacity="0.16"/>
  <rect x="300" y="280" width="380" height="500" rx="44" fill="#ffffff" opacity="0.28"/>

  <!-- clipboard body -->
  <rect x="268" y="312" width="488" height="500" rx="52" fill="url(#board)"/>

  <!-- clip -->
  <rect x="430" y="268" width="164" height="120" rx="40" fill="url(#clip)"/>
  <rect x="466" y="300" width="92" height="56" rx="24" fill="#15171b" opacity="0.9"/>

  <!-- text lines -->
  <rect x="332" y="446" width="360" height="40" rx="20" fill="#3b82f6"/>
  <rect x="332" y="538" width="300" height="32" rx="16" fill="#9aa3af"/>
  <rect x="332" y="612" width="340" height="32" rx="16" fill="#9aa3af"/>
  <rect x="332" y="686" width="220" height="32" rx="16" fill="#9aa3af"/>
</svg>
