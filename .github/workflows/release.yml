name: release

# Tag a release to build + publish installers for every platform:
#   git tag v0.1.0 && git push origin v0.1.0
# Or run manually from the Actions tab (uploads artifacts, no Release).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────── macOS ────────────────────────────────
  macos:
    runs-on: macos-14
    # Same secret names as the PromptBar repo, so the Developer ID certs
    # can be reused. All optional: with no secrets the job still builds
    # an (ad-hoc) unsigned .pkg instead of failing.
    env:
      # One .p12 holding both Developer ID identities (Application +
      # Installer), exported together via `security export`.
      DEVELOPER_ID_CERTS_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERTS_P12_BASE64 }}
      CERTS_P12_PASSWORD: ${{ secrets.CERTS_P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.CI_KEYCHAIN_PASSWORD }}
      # Baked into the binary at compile time for the license gate (both
      # optional; unset = default purchase URL + keys can't be verified).
      KLIPA_GUMROAD_PRODUCT_ID: ${{ vars.KLIPA_GUMROAD_PRODUCT_ID }}
      KLIPA_PURCHASE_URL: ${{ vars.KLIPA_PURCHASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      # Import the Developer ID certs into a fresh temp keychain.
      - name: Set up signing keychain
        if: ${{ env.DEVELOPER_ID_CERTS_P12_BASE64 != '' }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$DEVELOPER_ID_CERTS_P12_BASE64" | base64 -d > "$RUNNER_TEMP/certs.p12"
          security import "$RUNNER_TEMP/certs.p12" -k "$KEYCHAIN_PATH" -P "$CERTS_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certs.p12"
          APP_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed -E 's/^[^"]*"([^"]+)".*/\1/')
          INST_ID=$(security find-identity -v "$KEYCHAIN_PATH" | grep "Developer ID Installer" | head -1 | sed -E 's/^[^"]*"([^"]+)".*/\1/')
          echo "DEV_ID_APP=$APP_ID" >> "$GITHUB_ENV"
          echo "DEV_ID_INST=$INST_ID" >> "$GITHUB_ENV"
          echo "Signing as: $APP_ID | $INST_ID"

      - name: Build .pkg (signed + notarized when secrets are present)
        env:
          AC_APPLE_ID: ${{ secrets.APPLE_ID }}
          AC_TEAM_ID: ${{ secrets.TEAM_ID }}
          AC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: ./scripts/package-macos.sh

      - name: Gatekeeper sanity check
        if: ${{ env.DEVELOPER_ID_CERTS_P12_BASE64 != '' }}
        run: spctl --assess --type install -vvv dist/klipa-*-macos.pkg || true

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.pkg

  # ────────────────────────────── Windows ───────────────────────────────
  windows:
    runs-on: windows-latest
    env:
      KLIPA_GUMROAD_PRODUCT_ID: ${{ vars.KLIPA_GUMROAD_PRODUCT_ID }}
      KLIPA_PURCHASE_URL: ${{ vars.KLIPA_PURCHASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # choco's PATH update isn't visible to later steps; add it explicitly.
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build installer
        shell: pwsh
        run: ./scripts/package-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*-setup.exe
            dist/*-windows-x64.zip

  # ─────────────────────────────── Linux ────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    env:
      KLIPA_GUMROAD_PRODUCT_ID: ${{ vars.KLIPA_GUMROAD_PRODUCT_ID }}
      KLIPA_PURCHASE_URL: ${{ vars.KLIPA_PURCHASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev
          cargo install cargo-deb cargo-generate-rpm
          sudo wget -qO /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
      - name: Build all Linux artifacts
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./scripts/package-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage

  # ───────────────────────────── Publish ────────────────────────────────
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect + checksum
        run: |
          mkdir -p out
          find artifacts -type f -exec cp {} out/ \;
          cd out && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt
      - name: Publish / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create the release if it doesn't exist yet (e.g. it was cut
          # before CI was wired up), then upload/replace the artifacts.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "klipa $TAG" --generate-notes
          gh release upload "$TAG" out/* --repo "$GITHUB_REPOSITORY" --clobber

  # ─────────────────── Package-manager manifests ────────────────────────
  # Refresh the self-hosted Homebrew cask + Scoop bucket (and the winget /
  # AUR manifests) to the new version + checksums, then commit to main.
  # The repo doubles as the brew tap and scoop bucket, so this is all that
  # is needed for `brew`/`scoop` users to get the update. winget + AUR
  # still need a manual submit (see packaging/README.md).
  managers:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Bump manifests from the release checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # The release job published SHA256SUMS.txt as a release asset.
          ./scripts/update-package-managers.sh "$VERSION" \
            "https://github.com/$GITHUB_REPOSITORY/releases/download/v$VERSION/SHA256SUMS.txt"
      - name: Commit + push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "manifests already current"
          else
            git add Casks bucket packaging/winget packaging/aur
            git commit -m "Update package-manager manifests for ${GITHUB_REF_NAME}"
            git push origin main
          fi

  # ───────────────────────────── winget ─────────────────────────────────
  # Open a PR to microsoft/winget-pkgs with the new version. Runs only
  # when WINGET_TOKEN is set (a classic PAT that can push to your fork of
  # winget-pkgs). The FIRST-EVER submission must be done manually - see
  # packaging/README.md - after that this keeps it updated automatically.
  winget:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
    steps:
      - name: Submit update to winget-pkgs
        if: ${{ env.WINGET_TOKEN != '' }}
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: dev.peterdsp.klipa
          release-tag: ${{ github.ref_name }}
          installers-regex: '-windows-x64-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
