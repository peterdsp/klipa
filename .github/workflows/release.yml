name: release

# Tag a release to build + publish installers for every platform:
#   git tag v0.1.0 && git push origin v0.1.0
# Or run manually from the Actions tab (uploads artifacts, no Release).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────── macOS ────────────────────────────────
  macos:
    runs-on: macos-14
    # Secrets are mapped to env here so step-level `if:` can gate on them
    # (the `secrets` context isn't allowed in `if`). Missing secrets
    # resolve to empty strings, so the guarded steps simply skip.
    env:
      MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
      MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      DEV_ID_APP: ${{ secrets.DEV_ID_APP }}
      DEV_ID_INST: ${{ secrets.DEV_ID_INST }}
      AC_APPLE_ID: ${{ secrets.AC_APPLE_ID }}
      AC_TEAM_ID: ${{ secrets.AC_TEAM_ID }}
      AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
      MAS_APP: ${{ secrets.MAS_APP }}
      MAS_INST: ${{ secrets.MAS_INST }}
      TEAMID: ${{ secrets.TEAMID }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - name: Import Developer ID certificate
        if: ${{ env.MAC_CERT_P12 != '' }}
        run: |
          echo "$MAC_CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm -f /tmp/cert.p12

      - name: Build signed (or unsigned) .pkg
        run: ./scripts/package-macos.sh

      - name: Build Mac App Store .pkg
        if: ${{ env.MAS_APP != '' }}
        run: ./scripts/package-mas.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/*.pkg

  # ────────────────────────────── Windows ───────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          # choco's PATH update isn't visible to later steps; add it explicitly.
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build installer
        shell: pwsh
        run: ./scripts/package-windows.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/*-setup.exe

  # ─────────────────────────────── Linux ────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install build + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev
          cargo install cargo-deb cargo-generate-rpm
          sudo wget -qO /usr/local/bin/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          sudo chmod +x /usr/local/bin/appimagetool
      - name: Build all Linux artifacts
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: ./scripts/package-linux.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.AppImage

  # ───────────────────────────── Publish ────────────────────────────────
  release:
    needs: [macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect + checksum
        run: |
          mkdir -p out
          find artifacts -type f -exec cp {} out/ \;
          cd out && sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt
      - name: Publish / update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Create the release if it doesn't exist yet (e.g. it was cut
          # before CI was wired up), then upload/replace the artifacts.
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
                 --title "klipa $TAG" --generate-notes
          gh release upload "$TAG" out/* --repo "$GITHUB_REPOSITORY" --clobber
